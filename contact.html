<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подорожі — Контакти</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="head">
        <div class="container">
            <a href="index.html" class="logo">Подорожі</a>

            <nav class="menu">
                <ul class="menu-links">
                    <li class="menu-item">
                        <a href="index.html" class="menu-item-link">Головна</a>
                    </li>
                    <li class="menu-item">
                        <a href="destinations.html" class="menu-item-link">Напрямки</a>
                    </li>
                    <li class="menu-item">
                        <a href="contact.html" class="menu-item-link active">Контакти</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="contact">
        <h2 class="contact-title">Контакти</h2>

        <form class="form">
            <label for="name" class="form-label">Ім’я:</label>
            <input type="text" id="name" class="form-input" placeholder="Введіть ваше ім’я">

            <label for="email" class="form-label">Електронна пошта:</label>
            <input type="email" id="email" class="form-input" placeholder="Введіть вашу електронну пошту">

            <label for="message" class="form-label">Повідомлення:</label>
            <textarea id="message" class="form-textarea" placeholder="Введіть текст повідомлення"></textarea>

            <button type="submit" class="form-button">Відправити</button>
        </form>
    </section>

    <footer class="footer">
        <p class="footer-info">
            &copy; 2026 Подорожі. Всі права захищено.
            <span class="signature-hover">· А.К.</span>
        </p>
    </footer>
</body>
</html>
